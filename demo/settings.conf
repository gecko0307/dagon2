// Main configuration file for Dagon applications

// Logger settings
log.enabled: true;
log.level: "debug";
log.toStdout: true;
log.timestampTags: false;
log.levelTags: true;
log.file: "demo.log";

// VFS settings
vfs.appDataFolder: ".dagon";

// Window settings (used in windowed mode)
window.width: 1280;
window.height: 720;
window.x: "auto";
window.y: "auto";
window.resizable: true;
window.title: "Dagon Demo";
window.hiDPI: true;
window.HDROutput: false;

// Display settings
fullscreen: false;
vsync: 1;
updatesPerSecond: 60;
supersampling: 1;
hideConsole: false;

// Locale settings
locale: "en_US";

// GPU settings
gpu.debugOutput: true;
gpu.outputColorProfile: "Gamma22";
gpu.anisotropicFiltering: true;
gpu.defaultTextureAnisotropy: 8;
